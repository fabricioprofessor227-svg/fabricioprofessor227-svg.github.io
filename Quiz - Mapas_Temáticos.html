    <style>

        body {

 /* Botão de tela cheia */

        .nav-buttons {

        .nav-btn {

        .initial-screen, .result-screen, .intermediate-screen {

        .initial-screen button, .result-screen button, .intermediate-screen button {

        .intermediate-screen button:first-child {

        footer {
            font-size: 0.75rem;

        }

        @media print {
            .no-print, .nav-buttons, .alternatives li, .feedback, .progress-area, .attempts-area, .header, footer {
                display: none !important;

            .report-content {
                display: block !important;
                padding: 20px;
            }
            .question-card.active {
                display: none !important;

        }
        .report-content {
            display: none;
        }
    </style>

        <h1>🗺️ Quiz: Mapas Temáticos e Análise Territorial</h1>
        <p>Subtema 2 – Produção e ocupação do espaço · Análise e elaboração de mapas temáticos</p>
    </div>

    <div class="progress-area" id="progressArea" style="display: none;">
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="question-indicator" id="questionIndicator">Questão 1 de 20</div>
    </div>

    <div class="attempts-area" id="attemptsArea" style="display: none;"></div>

    <div class="questions-area" id="questionsArea"></div>

    <div style="padding: 0 28px 24px 28px;" class="no-print" id="navContainer"></div>

    <footer>Quiz preparatório para concurso | Elaborado por Ana</footer>
</div>

<script>
    // ----- QUESTÕES DO QUIZ 2 (Mapas Temáticos) -----
    // Ordem das corretas: 1B, 2D, 3B, 4B, 5C, 6D, 7D, 8A, 9C, 10A, 11C, 12A, 13B, 14B, 15A, 16D, 17A, 18B, 19A, 20C
    const questions = [
        { text: "A cartografia temática tem como principal objetivo:",
          options: ["Representar apenas as divisas políticas entre países", "Representar fenômenos específicos (população, clima, economia) sobre uma base geográfica", "Criar mapas exclusivamente para navegação marítima", "Substituir completamente a cartografia geral"],
          correct: 1, // B
          justification: "A cartografia temática foca na representação de fenômenos particulares, como densidade populacional, tipos de clima, produção econômica, etc., utilizando uma base geográfica de referência." },
        { text: "Analise as afirmações sobre projeções cartográficas: I. A projeção de Mercator preserva as áreas dos continentes. II. A projeção de Peters é conhecida por preservar as áreas relativas. III. Todas as projeções apresentam algum tipo de distorção. Está(ão) correta(s):",
          options: ["Apenas I", "Apenas II", "Apenas I e III", "Apenas II e III"],
          correct: 3, // D
          justification: "Mercator distorce áreas (especialmente nos polos) – afirmação I é falsa. Peters preserva áreas, mas distorce formas – afirmação II é verdadeira. Todas as projeções têm distorções – afirmação III é verdadeira. Portanto, apenas II e III estão corretas." },
        { text: "O conceito de 'escala cartográfica' refere-se à relação entre:",
          options: ["A altura do mapa e sua largura", "A distância no mapa e a distância real na superfície terrestre", "O produto entre a medida no mapa e a medida real correspondente", "A quantidade de informações representadas"],
          correct: 1, // B
          justification: "Escala cartográfica é a relação (razão) entre a distância medida no mapa e a distância real correspondente na superfície terrestre. A alternativa C (produto) está matematicamente incorreta." },
        { text: "Um mapa de densidade populacional por município é um exemplo de mapa:",
          options: ["Físico", "Temático quantitativo", "Temático qualitativo", "Político-administrativo"],
          correct: 1, // B
          justification: "Mapas que mostram quantidades (como habitantes por km², renda per capita, etc.) são classificados como temáticos quantitativos, pois representam dados numéricos distribuídos no espaço." },
        { text: "Sobre os elementos obrigatórios de um mapa, é correto afirmar que:",
          options: ["Apenas o título é obrigatório", "A rosa dos ventos é obrigatória em todos os mapas", "Título, legenda, escala e fonte são elementos essenciais", "A legenda pode ser omitida em mapas temáticos"],
          correct: 2, // C
          justification: "Um mapa completo deve conter título (o que representa), legenda (significado dos símbolos), escala (relação de proporção) e fonte (origem dos dados) para ser corretamente interpretado." },
        { text: "Analise: 'A projeção de Mercator é amplamente utilizada em mapas-múndi porque preserva as áreas dos continentes.' Esta afirmação é:",
          options: ["Verdadeira, pois Mercator é a projeção mais precisa", "Verdadeira, pois foi criada no século XXI", "Falsa, pois Mercator preserva ângulos (conforme), mas distorce áreas", "Falsa, pois não preserva áreas, apenas ângulos e formas localmente"],
          correct: 3, // D
          justification: "Mercator é uma projeção conforme (preserva ângulos e formas localmente), mas distorce severamente áreas, especialmente nas altas latitudes (Groenlândia parece maior que a África, quando na verdade é muito menor)." },
        { text: "O sensoriamento remoto e as geotecnologias permitem, entre outras aplicações:",
          options: ["Apenas a localização de veículos", "Substituir totalmente o trabalho de campo", "Monitorar desmatamento, queimadas e expansão urbana em tempo real", "Eliminar a necessidade de mapas impressos"],
          correct: 2, // D
          justification: "Imagens de satélite permitem monitorar mudanças na cobertura da terra, desmatamento, queimadas, crescimento urbano, áreas agrícolas, etc., com alta frequência temporal." },
        { text: "Um Sistema de Informação Geográfica (SIG) é uma ferramenta que permite:",
          options: ["Armazenar, analisar e visualizar dados georreferenciados", "Apenas imprimir mapas coloridos", "Substituir completamente a cartografia manual", "Exclusivamente o cálculo de rotas"],
          correct: 0, // A
          justification: "SIGs são softwares que integram dados espaciais (mapas) com atributos (tabelas), permitindo análises complexas como sobreposição de camadas, consultas espaciais e modelagem territorial." },
        { text: "Complete: A __________ é a ciência que estuda a representação gráfica da superfície terrestre, enquanto a __________ é a técnica de representar o relevo em curvas de nível.",
          options: ["Cartografia / altimetria", "Geografia / planimetria", "Cartografia / hipsometria", "Geodésia / topografia"],
          correct: 2, // C
          justification: "Cartografia é a ciência da representação gráfica da Terra. Hipsometria é a técnica de representar altitudes, frequentemente por meio de curvas de nível ou cores hipsométricas." },
        { text: "Sobre os mapas topográficos, é correto afirmar que:",
          options: ["Representam detalhadamente o relevo, hidrografia e vegetação", "São usados exclusivamente para navegação marítima", "Não utilizam curvas de nível", "Representam apenas aspectos políticos"],
          correct: 0, // A
          justification: "Mapas topográficos representam elementos naturais (relevo com curvas de nível, hidrografia, vegetação) e artificiais (estradas, cidades, limites) com alto nível de detalhe." },
        { text: "Analise as afirmações sobre os mapas temáticos: I. São utilizados para representar fenômenos específicos. II. Podem usar cores, símbolos e hachuras para representar dados. III. Ignoram completamente a base cartográfica. Está(ão) correta(s):",
          options: ["Apenas I", "Apenas II", "Apenas I e II", "I, II e III"],
          correct: 2, // C
          justification: "I e II estão corretas. Mapas temáticos sempre utilizam uma base cartográfica (limites, rios, cidades) para localização dos fenômenos – afirmação III é falsa." },
        { text: "O 'datum' cartográfico é importante porque:",
          options: ["Define o modelo de representação da forma da Terra para referenciar coordenadas", "Determina as cores do mapa", "Estabelece a escala do mapa", "Define o título do mapa"],
          correct: 0, // A
          justification: "Datum é um conjunto de parâmetros que define o modelo geométrico da Terra (elipsoide de referência) e sua orientação, permitindo que coordenadas sejam consistentemente representadas." },
        { text: "Sobre a produção de mapas temáticos, assinale a alternativa correta:",
          options: ["Requer apenas conhecimentos artísticos", "Envolve coleta de dados, escolha da base cartográfica e definição de símbolos", "Não necessita de dados estatísticos", "Pode ser feita sem qualquer conhecimento técnico"],
          correct: 1, // B
          justification: "A elaboração de mapas temáticos envolve etapas técnicas: definição do tema, coleta e tratamento dos dados, escolha da base cartográfica, definição da simbologia, construção da legenda e finalização." },
        { text: "A 'anamorfose' é uma técnica cartográfica que consiste em:",
          options: ["Criar mapas em 3D", "Distorcer propositalmente as áreas dos territórios proporcionalmente a um dado estatístico", "Representar apenas o relevo", "Eliminar a escala do mapa"],
          correct: 1, // B
          justification: "Anamorfose (ou cartograma) deforma as áreas dos territórios de acordo com um dado estatístico (ex: população, PIB), tornando o tamanho de cada região proporcional ao valor representado." },
        { text: "O 'georreferenciamento' de imagens de satélite é o processo de:",
          options: ["Atribuir coordenadas geográficas a uma imagem alinhando-a a um sistema de referência", "Colorir a imagem artificialmente", "Reduzir a resolução da imagem", "Excluir informações da imagem"],
          correct: 0, // A
          justification: "Georreferenciamento alinha a imagem a um sistema de coordenadas conhecido (ex: UTM, latitude/longitude), permitindo sua integração com outros dados espaciais e medições precisas." },
        { text: "Sobre as curvas de nível em mapas topográficos, é correto afirmar que:",
          options: ["Linhas mais afastadas indicam terrenos muito íngremes", "Não indicam altitude", "São usadas apenas em mapas políticos", "Linhas mais próximas indicam declives acentuados"],
          correct: 3, // D
          justification: "Curvas de nível próximas indicam grande variação de altitude em curta distância horizontal, ou seja, declive acentuado (terreno íngreme). Linhas afastadas indicam relevo suave." },
        { text: "A 'escala gráfica' difere da 'escala numérica' porque:",
          options: ["É representada por um segmento de reta graduado, permitindo leitura visual direta", "Não precisa ser usada em mapas", "É menos precisa", "Só aparece em mapas antigos"],
          correct: 0, // A
          justification: "Escala gráfica é uma linha graduada que representa visualmente a relação entre distância no mapa e distância real, permitindo medição direta sem cálculos, além de se manter correta mesmo se o mapa for ampliado ou reduzido." },
        { text: "Sobre a ocupação do espaço representada em mapas históricos, é correto afirmar que:",
          options: ["São sempre neutros e objetivos", "Refletem as visões, interesses e ideologias de sua época", "Não sofrem influência política", "Representam exclusivamente a verdade geográfica"],
          correct: 1, // B
          justification: "Mapas históricos carregam intenções políticas, ideológicas e culturais de quem os produziu. Não são neutros: refletem disputas territoriais, visões de mundo e relações de poder de cada época." },
        { text: "A 'legenda' em um mapa temático tem a função de:",
          options: ["Explicar o significado dos símbolos, cores e padrões utilizados", "Dar título ao mapa", "Indicar a direção norte", "Mostrar a escala do mapa"],
          correct: 0, // A
          justification: "A legenda é essencial para a leitura do mapa, pois decodifica os símbolos empregados (cores, ícones, hachuras, tamanhos), permitindo ao usuário interpretar corretamente a informação representada." },
        { text: "Concluindo: a análise e elaboração de mapas temáticos são fundamentais para:",
          options: ["Apenas decorar nomes de lugares", "Substituir livros didáticos", "Compreender a organização e transformação do espaço geográfico", "Exclusivamente a navegação marítima"],
          correct: 2, // C
          justification: "Mapas temáticos permitem analisar fenômenos espaciais, planejar ações territoriais, compreender desigualdades regionais, monitorar mudanças ambientais e subsidiar políticas públicas." }
    ];

    let studentName = "";
    let startTime = null;
    let currentQuestion = 0;
    let answers = new Array(questions.length).fill(null);
    let attempts = 1;
    let quizStarted = false;
    let totalQuestions = questions.length;
    let lastScore = 0;
    let lastNota = 0;

    const progressArea = document.getElementById('progressArea');
    const attemptsArea = document.getElementById('attemptsArea');
    const questionsArea = document.getElementById('questionsArea');
    const navContainer = document.getElementById('navContainer');
    const progressFill = document.getElementById('progressFill');
    const questionIndicator = document.getElementById('questionIndicator');

    function updateProgress() {
        const answered = answers.filter(a => a !== null).length;
        const percent = (answered / totalQuestions) * 100;
        progressFill.style.width = `${percent}%`;
        questionIndicator.innerText = `Questão ${currentQuestion + 1} de ${totalQuestions}`;
    }

    function saveAnswer(selectedIndex) {
        answers[currentQuestion] = selectedIndex;
        updateProgress();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questions[currentQuestion];
        const userAnswer = answers[currentQuestion];
        
        let html = `<div class="question-card active">`;
        html += `<div class="question-text">${currentQuestion + 1}. ${q.text}</div>`;
        html += `<ul class="alternatives">`;
        
        q.options.forEach((opt, idx) => {
            const isSelected = (userAnswer === idx);
            html += `<li onclick="selectAlternative(${idx})" class="${isSelected ? 'selected' : ''}">
                        <span class="alt-letter">${String.fromCharCode(65+idx)}.</span>
                        <span class="alt-text">${opt}</span>
                     </li>`;
        });
        html += `</ul>`;
        
        if (userAnswer !== null) {
            const isCorrect = (userAnswer === q.correct);
            html += `<div class="feedback ${isCorrect ? 'correct' : 'wrong'}" style="display:block;">
                        <strong>${isCorrect ? '✅ Correto!' : '❌ Incorreto.'}</strong>
                        <div class="justification">📖 ${q.justification}</div>
                     </div>`;
        } else {
            html += `<div class="feedback" style="display:none;"></div>`;
        }
        
        html += `</div>`;
        questionsArea.innerHTML = html;
        updateProgress();
        renderNavigation();
    }

    function selectAlternative(idx) {
        if (answers[currentQuestion] === null) {
            saveAnswer(idx);
        }
    }

    function renderNavigation() {
        const isLast = currentQuestion === totalQuestions - 1;
        const hasAnswered = answers[currentQuestion] !== null;
        
        let html = `<div class="nav-buttons">`;
        if (!isLast) {
            html += `<button class="nav-btn" id="navNext" ${!hasAnswered ? 'disabled' : ''}>Próxima Questão ▶</button>`;
        } else {
            html += `<button class="nav-btn" id="navFinish" ${!hasAnswered ? 'disabled' : ''}>✅ Finalizar Quiz</button>`;
        }
        html += `</div>`;
        navContainer.innerHTML = html;
        
        document.getElementById('navNext')?.addEventListener('click', () => { goToNext(); });
        document.getElementById('navFinish')?.addEventListener('click', () => { finishQuiz(); });
    }

    function goToNext() {
        if (currentQuestion < totalQuestions - 1 && answers[currentQuestion] !== null) {
            currentQuestion++;
            renderCurrentQuestion();
        }
    }

    function finishQuiz() {
        if (answers.some(a => a === null)) {
            alert("⚠️ Responda todas as questões antes de finalizar!");
            return;
        }
        
        let score = 0;
        for (let i = 0; i < totalQuestions; i++) {
            if (answers[i] === questions[i].correct) score++;
        }
        const nota = (score / totalQuestions) * 10;
        lastScore = score;
        lastNota = nota;
        
        if (nota >= 7.0) {
            showIntermediateScreen(score, nota);
        } else {
            showReprovalScreen();
        }
    }

    function showIntermediateScreen(score, nota) {
        progressArea.style.display = 'none';
        attemptsArea.style.display = 'none';
        
        questionsArea.innerHTML = `
            <div class="intermediate-screen">
                <h2>🎉 Parabéns, ${studentName}!</h2>
                <p>Você atingiu nota ${nota.toFixed(1)} (${score}/${totalQuestions}).</p>
                <p>Escolha uma opção abaixo:</p>
                <button id="generateReportBtn">📄 Gerar Relatório</button>
                <button id="restartFromIntermediateBtn">🔄 Refazer Quiz</button>
            </div>
        `;
        navContainer.innerHTML = '';
        
        document.getElementById('generateReportBtn')?.addEventListener('click', () => generateReportAndContinue(score, nota));
        document.getElementById('restartFromIntermediateBtn')?.addEventListener('click', () => {
            attempts++;
            resetQuizState();
            startQuiz();
        });
    }

    function generateReportAndContinue(score, nota) {
        let mensao = "";
        if (nota >= 8.5) mensao = "Excelente (Parabéns!)";
        else if (nota >= 7.0) mensao = "Bom (Parabéns!)";
        
        const wrongQuestions = [];
        for (let i = 0; i < totalQuestions; i++) {
            if (answers[i] !== questions[i].correct) wrongQuestions.push(i + 1);
        }
        
        const endTime = new Date();
        const startStr = startTime ? startTime.toLocaleString() : "Não registrado";
        const endStr = endTime.toLocaleString();
        
        const pdfTitle = `${studentName} - Quiz Mapas Tematicos`;
        document.title = pdfTitle;
        
        const reportHtml = `
            <div class="report-content" style="display:block; font-family: monospace; padding: 20px;">
                <h2>📋 Relatório de Desempenho</h2>
                <p><strong>Aluno(a):</strong> ${studentName}</p>
                <p><strong>Data/Hora:</strong> ${endStr}</p>
                <p><strong>Início:</strong> ${startStr}</p>
                <p><strong>Pontuação:</strong> ${score}/${totalQuestions}</p>
                <p><strong>Nota:</strong> ${nota.toFixed(1)}</p>
                <p><strong>Mensão:</strong> ${mensao}</p>
                <p><strong>Tentativas nesta sessão:</strong> ${attempts}</p>
                <p><strong>Questões erradas:</strong> ${wrongQuestions.length > 0 ? wrongQuestions.join(", ") : "Nenhuma"}</p>
                <hr>
                <p>Parabéns! Você foi aprovado(a). Continue assim!</p>
            </div>
        `;
        
        const printDiv = document.createElement('div');
        printDiv.innerHTML = reportHtml;
        document.body.appendChild(printDiv);
        window.print();
        document.body.removeChild(printDiv);
        
        document.title = "Quiz: Mapas Temáticos e Análise Territorial";
        
        showFinalCongratsScreen();
    }

    function showFinalCongratsScreen() {
        questionsArea.innerHTML = `
            <div class="result-screen">
                <h2>🎉 Parabéns, ${studentName}!</h2>
                <p>O relatório foi gerado com sucesso!</p>
                <p>Continue assim, o conhecimento transforma!</p>
                <p>💙 Atenciosamente, Ana (sua parceira de estudos).</p>
                <button id="closeFinalBtn">✅ Encerrar</button>
            </div>
        `;
        navContainer.innerHTML = '';
        document.getElementById('closeFinalBtn')?.addEventListener('click', () => {
            window.close();
            setTimeout(() => alert("Feche esta aba para encerrar."), 100);
        });
    }

    function showReprovalScreen() {
        questionsArea.innerHTML = `
            <div class="result-screen">
                <h2>😔 Tente Novamente, ${studentName}!</h2>
                <p>Você não atingiu a nota mínima (7,0).</p>
                <p>Nota obtida: ${lastNota.toFixed(1)} (${lastScore}/${totalQuestions})</p>
                <p>O quiz será reiniciado para uma nova tentativa.</p>
                <button id="restartReproval">🔄 Recomeçar Quiz</button>
            </div>
        `;
        navContainer.innerHTML = '';
        document.getElementById('restartReproval')?.addEventListener('click', () => {
            attempts++;
            resetQuizState();
            startQuiz();
        });
        progressArea.style.display = 'none';
        attemptsArea.style.display = 'none';
    }

    function resetQuizState() {
        answers = new Array(totalQuestions).fill(null);
        currentQuestion = 0;
        renderCurrentQuestion();
        updateProgress();
    }

    function startQuiz() {
        quizStarted = true;
        progressArea.style.display = 'block';
        attemptsArea.style.display = 'block';
        attemptsArea.innerHTML = `📊 Tentativas nesta sessão: ${attempts}`;
        currentQuestion = 0;
        renderCurrentQuestion();
    }

    function showInitialScreen() {
        questionsArea.innerHTML = `
            <div class="initial-screen">
                <h2>📝 Identificação</h2>
                <p>Digite seu nome para começar o quiz:</p>
                <input type="text" id="studentNameInput" placeholder="Seu nome completo" autocomplete="off">
                <br>
                <button id="startQuizBtn">✨ Iniciar Quiz ✨</button>
            </div>
        `;
        navContainer.innerHTML = '';
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            const nameInput = document.getElementById('studentNameInput');
            if (nameInput && nameInput.value.trim() !== "") {
                studentName = nameInput.value.trim();
                startTime = new Date();
                startQuiz();
            } else {
                alert("Por favor, digite seu nome para continuar.");
            }
        });
    }

    showInitialScreen();
    // Função para alternar tela cheia
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            document.getElementById('fullscreenBtn').innerHTML = '✕ Sair da Tela Cheia';
        } else {
            document.exitFullscreen();
            document.getElementById('fullscreenBtn').innerHTML = '⛶ Tela Cheia';
        }
    }

    // Detecta se o usuário apertou ESC e atualiza o botão
    document.addEventListener('fullscreenchange', function() {
        const btn = document.getElementById('fullscreenBtn');
        if (document.fullscreenElement) {
            btn.innerHTML = '✕ Sair da Tela Cheia';
        } else {
            btn.innerHTML = '⛶ Tela Cheia';
        }
    });

</script>
</body>
</html>
